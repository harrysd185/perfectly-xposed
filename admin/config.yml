# ============================================================================
#  Perfectly Xposed — editor configuration
#  Backend: DecapBridge (PKCE auth). Do not edit the backend block unless
#  DecapBridge gives you new values.
# ============================================================================

# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: harrysd185/perfectly-xposed
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/e53e19b5-deda-4d13-805e-944df9ba21cb/pkce
  auth_token_endpoint: /sites/e53e19b5-deda-4d13-805e-944df9ba21cb/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name

# Where uploaded photos are stored in the repo, and how they're referenced on the site
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "gallery"
    label: "Gallery"
    files:
      - name: "photos"
        label: "Gallery photos"
        file: "data/gallery.json"
        description: "Add, edit, remove, and drag to reorder the photos in your gallery."
        fields:
          - name: "photos"
            label: "Photos"
            label_singular: "Photo"
            widget: "list"
            summary: "{{fields.title}} — {{fields.location}}"
            fields:
              - { name: "image", label: "Photo", widget: "image" }
              - { name: "title", label: "Title / caption", widget: "string", required: false }
              - { name: "location", label: "Location", widget: "string", required: false }
              - name: "category"
                label: "Category"
                widget: "select"
                default: "portrait"
                options:
                  - { label: "Portrait", value: "portrait" }
                  - { label: "Landscape", value: "landscape" }
                  - { label: "Street", value: "street" }
